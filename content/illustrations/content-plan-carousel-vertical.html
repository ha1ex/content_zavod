<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Контент-план в Кайтен — карусель 6 карточек 1080×1350</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --violet: #7d4ccf;
    --violet-deep: #6f43b8;
    --violet-tint: #f3eefb;
    --violet-line: #e2d4f6;
    --text: #211a2e;
    --text-2: #6c6c78;
    --text-3: #9a9aa6;
    --page: #eceef2;
    --card-line: #ececf0;
    --line-soft: #f0f0f4;
    --blue: #2f8ff0;   --blue-t: #e5f1fd;
    --amber: #f5960b;  --amber-t: #fff2df;
    --green: #34b364;  --green-t: #e5f6ec;
    --teal: #12b3a6;   --teal-t: #e0f6f4;
    --red: #ef4b52;    --red-t: #fdeaeb;
    --grey: #8a8a97;   --grey-t: #eeeef1;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--page);
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 48px 24px 80px;
  }
  main { width: 1128px; margin: 0 auto; }
  .head h1 { font-size: 24px; font-weight: 800; margin: 0 0 6px; letter-spacing: -0.4px; }
  .head p { margin: 0 0 8px; color: var(--text-2); font-size: 15px; }
  figure { margin: 0 0 56px; }
  figcaption { color: var(--text-2); font-size: 14px; margin: 14px 4px 0; }

  /* ---- exportable frame: fixed 1080 x 1350 (4:5) ---- */
  .frame {
    position: relative;
    width: 1080px; height: 1350px;
    border-radius: 34px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 44px 100px -54px rgba(125, 76, 207, 0.5);
  }
  .glow { position: absolute; pointer-events: none; z-index: 0;
    background: radial-gradient(closest-side, rgba(125,76,207,0.14), rgba(125,76,207,0)); }
  .glow.tr { top: -240px; right: -200px; width: 720px; height: 720px; }
  .glow.bl { bottom: -280px; left: -220px; width: 800px; height: 800px; }
  .inner { position: relative; z-index: 1; height: 100%; padding: 74px 70px; display: flex; flex-direction: column; }

  .eyebrow { display: inline-flex; align-items: center; gap: 12px;
    color: var(--violet-deep); font-weight: 800; font-size: 19px; letter-spacing: 3px; }
  .eyebrow .n { display: inline-flex; align-items: center; justify-content: center;
    min-width: 44px; height: 44px; padding: 0 12px; border-radius: 12px;
    background: var(--violet); color: #fff; font-size: 22px; letter-spacing: 0; }
  h2.title { margin: 24px 0 0; font-size: 66px; line-height: 1.02; font-weight: 900; letter-spacing: -1.9px; }
  h2.title .hl { color: var(--violet); }
  .lead { margin: 26px 0 0; font-size: 30px; line-height: 1.36; color: var(--text-2); font-weight: 500; }
  .lead b { color: var(--text); font-weight: 700; }

  /* ---- generic product-mock chrome ---- */
  .mock { border: 1px solid #e7e7ee; border-radius: 22px; background: #fff; overflow: hidden;
    box-shadow: 0 34px 64px -46px rgba(31,26,46,0.5); }
  .mock .bar { height: 54px; display: flex; align-items: center; gap: 10px; padding: 0 22px;
    background: #faf9fc; border-bottom: 1px solid var(--line-soft); }
  .mock .bar i { width: 13px; height: 13px; border-radius: 50%; display: inline-block; }
  .mock .bar .d1 { background: #ff6159; } .mock .bar .d2 { background: #ffbd2e; } .mock .bar .d3 { background: #29c840; }
  .mock .bar .tab { margin-left: 16px; font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 9px; }
  .mock .bar .tab svg { width: 20px; height: 20px; color: var(--violet); }
  .mock .bar .grow { flex: 1; }
  .mock .bar .pill { font-size: 15px; font-weight: 600; color: var(--text-2); background: #fff;
    border: 1px solid var(--card-line); border-radius: 9px; padding: 7px 14px; }

  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }
  .avatar-mini { width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center;
    justify-content: center; color: #fff; font-weight: 800; font-size: 16px; flex: 0 0 auto;
    border: 2px solid #fff; box-shadow: 0 3px 8px -3px rgba(0,0,0,.3); }

  /* ---- footer ---- */
  .foot { margin-top: auto; padding-top: 26px; display: flex; align-items: center; justify-content: space-between; }
  .foot .logo { height: 40px; width: auto; display: block; }
  .foot .site { font-size: 20px; font-weight: 700; color: var(--text-3); letter-spacing: -0.2px; }
  .foot.on-dark .site { color: rgba(255,255,255,.65); }

  /* =====================================================================
     CARD 1 — COVER (dark, bold)
     ===================================================================== */
  .c1 .frame { background: radial-gradient(120% 90% at 20% 0%, #3a2263 0%, #241640 55%, #1a1030 100%); }
  .c1 .inner { padding: 78px 72px; }
  .c1 .kick { display: inline-flex; align-items: center; gap: 14px; color: #cbb6f2; font-weight: 800;
    font-size: 20px; letter-spacing: 3px; }
  .c1 .kick .k-logo { width: 40px; height: 40px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(150deg,#8a5cd8,#6f43b8); }
  .c1 .kick .k-logo svg { width: 24px; height: 24px; }
  .c1 h1.big { margin: 40px 0 0; color: #fff; font-size: 92px; font-weight: 900; line-height: 0.98; letter-spacing: -3px; }
  .c1 h1.big em { font-style: normal; color: #b78bf0;
    background: linear-gradient(180deg,#c9a6f7,#9a6bec); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .c1 .sub { margin: 30px 0 0; color: #d6cbea; font-size: 30px; font-weight: 500; line-height: 1.3; max-width: 780px; }

  .c1 .stack { position: relative; margin-top: 58px; flex: 1; }
  .c1 .thumb { position: absolute; left: 0; right: 0; border-radius: 20px; overflow: hidden;
    border: 1px solid rgba(255,255,255,.14); background: #fff; box-shadow: 0 44px 80px -34px rgba(0,0,0,.78); }
  .c1 .thumb .th-bar { height: 68px; display: flex; align-items: center; gap: 16px; padding: 0 28px; border-bottom: 1px solid var(--line-soft); }
  .c1 .thumb .th-ic { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }
  .c1 .thumb .th-ic svg { width: 25px; height: 25px; }
  .c1 .thumb .th-tt { font-size: 26px; font-weight: 800; }
  .c1 .thumb .th-tag { margin-left: auto; font-size: 17px; font-weight: 800; letter-spacing: .5px; color: #fff; padding: 7px 15px; border-radius: 999px; }
  .c1 .thumb .th-body { padding: 18px 26px; display: flex; gap: 14px; }
  .c1 .thumb .th-col { flex: 1; height: 104px; border-radius: 12px; background: #f4f2f9; border: 1px solid #eae6f3;
    padding: 12px; display: flex; flex-direction: column; gap: 9px; }
  .c1 .thumb .th-row { height: 18px; border-radius: 6px; background: #ece8f5; }
  .c1 .thumb .chipbar { height: 15px; border-radius: 6px; }
  .c1 .t-a { top: 0;   transform: rotate(-2.4deg); z-index: 3; }
  .c1 .t-b { top: 222px; transform: rotate(1.8deg); z-index: 2; }
  .c1 .t-c { top: 444px; transform: rotate(-1.2deg); z-index: 1; }

  /* =====================================================================
     CARD 2 — ТАБЛИЦА
     ===================================================================== */
  .c2 table { width: 100%; border-collapse: collapse; font-size: 19px; }
  .c2 thead th { text-align: left; font-weight: 800; color: var(--text-2); font-size: 16px; letter-spacing: .3px;
    padding: 22px 16px; background: #faf9fc; border-bottom: 1px solid #ececf0; text-transform: uppercase; }
  .c2 tbody td { padding: 27px 16px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; color: var(--text); font-weight: 600; }
  .c2 tbody tr:last-child td { border-bottom: none; }
  .c2 .date { font-weight: 800; color: var(--text); white-space: nowrap; }
  .c2 .plat { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; }
  .c2 .plat .sq { width: 26px; height: 26px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 800; }
  .c2 .st { display: inline-flex; align-items: center; gap: 9px; font-weight: 700; font-size: 16px; white-space: nowrap; }
  .c2 .fmt { display: inline-block; padding: 6px 13px; border-radius: 999px; font-size: 15px; font-weight: 700;
    background: var(--violet-tint); color: var(--violet-deep); border: 1px solid var(--violet-line); }
  .c2 .who { display: inline-flex; }
  .chips { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 40px; }
  .chips .chip { font-size: 22px; font-weight: 700; color: var(--text); padding: 14px 24px; border-radius: 15px;
    background: #f6f5fa; border: 1px solid #ececf3; }
  .chips .chip b { color: var(--violet-deep); }
  .note { margin-top: 40px; font-size: 26px; line-height: 1.4; color: var(--text-2); font-weight: 500;
    padding-left: 24px; border-left: 6px solid var(--amber); }
  .note b { color: var(--text); font-weight: 700; }

  /* =====================================================================
     CARD 3 — КАЛЕНДАРЬ
     ===================================================================== */
  .cal { padding: 26px 28px 30px; }
  .cal .cal-head { display: flex; align-items: center; margin-bottom: 18px; }
  .cal .cal-head .m { font-size: 26px; font-weight: 800; }
  .cal .cal-head .nav { margin-left: auto; display: flex; gap: 10px; }
  .cal .cal-head .nav b { width: 40px; height: 40px; border-radius: 11px; border: 1px solid var(--card-line);
    display: inline-flex; align-items: center; justify-content: center; color: var(--text-2); font-size: 20px; }
  .cal .wd { display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; margin-bottom: 10px; }
  .cal .wd span { text-align: center; font-size: 15px; font-weight: 800; color: var(--text-3); letter-spacing: .5px; }
  .cal .grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 10px; }
  .cal .cell { height: 132px; min-width: 0; border-radius: 14px; border: 1px solid #efeff3; background: #fcfcfe; padding: 11px 11px;
    display: flex; flex-direction: column; gap: 7px; overflow: hidden; }
  .cal .cell.dim { background: #fafafb; }
  .cal .cell .num { font-size: 17px; font-weight: 800; color: var(--text); }
  .cal .cell.dim .num { color: var(--text-3); }
  .cal .cell.today .num { color: #fff; background: var(--violet); width: 30px; height: 30px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center; }
  .cal .ev { font-size: 13.5px; font-weight: 700; color: #fff; border-radius: 7px; padding: 5px 8px; line-height: 1.15;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cal .gap { margin-top: auto; align-self: stretch; height: 22px; border-radius: 7px;
    border: 2px dashed #d9d3ea; color: var(--violet-deep); font-size: 12px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; letter-spacing: .3px; }
  .cal .legend { display: flex; gap: 18px; margin-top: 18px; flex-wrap: wrap; }
  .cal .legend span { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; color: var(--text-2); }

  /* =====================================================================
     CARD 4 — КАНБАН
     ===================================================================== */
  .kb { padding: 24px 26px 28px; overflow: hidden; }
  .kb .cols { display: flex; gap: 14px; }
  .kb .col { flex: 1 1 0; min-width: 0; }
  .kb .col-h { display: flex; align-items: center; gap: 9px; padding: 0 4px 12px; }
  .kb .col-h .nm { font-size: 15.5px; font-weight: 800; letter-spacing: -.2px; }
  .kb .col-h .cnt { margin-left: auto; font-size: 13px; font-weight: 800; color: var(--text-3);
    background: #f0f0f4; border-radius: 999px; padding: 2px 9px; }
  .kb .col-body { background: #f7f7fa; border-radius: 14px; padding: 10px; display: flex; flex-direction: column; gap: 10px; min-height: 430px; }
  .kb .kcard { background: #fff; border: 1px solid #ececf0; border-radius: 12px; padding: 12px; position: relative;
    box-shadow: 0 8px 18px -14px rgba(31,26,46,.4); }
  .kb .kcard .lab { height: 7px; width: 46px; border-radius: 4px; margin-bottom: 9px; }
  .kb .kcard .ct { font-size: 15px; font-weight: 700; line-height: 1.24; color: var(--text); }
  .kb .kcard .meta { display: flex; align-items: center; gap: 8px; margin-top: 11px; }
  .kb .kcard .meta .due { font-size: 12.5px; font-weight: 700; color: var(--text-2); display: inline-flex; align-items: center; gap: 5px; }
  .kb .kcard .meta .av { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; color: #fff; font-weight: 800; font-size: 12px;
    display: inline-flex; align-items: center; justify-content: center; }
  .kb .kcard.ghost { background: transparent; border: 2px dashed #dcdce3; box-shadow: none; height: 58px;
    display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 22px; }

  /* =====================================================================
     CARD 5 — КАК ВЫБРАТЬ ФОРМАТ
     ===================================================================== */
  .decide { margin-top: 44px; display: flex; flex-direction: column; gap: 28px; }
  .drow { display: flex; align-items: stretch; gap: 28px; border: 1px solid var(--card-line); border-radius: 24px;
    padding: 38px 34px; background: #fff; box-shadow: 0 24px 50px -44px rgba(31,26,46,.5); position: relative; overflow: hidden; }
  .drow::before { content:""; position: absolute; left: 0; top: 0; bottom: 0; width: 9px; background: var(--ac); }
  .drow .ic { width: 104px; height: 104px; border-radius: 24px; flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
    background: var(--ac-t); color: var(--ac); }
  .drow .ic svg { width: 54px; height: 54px; }
  .drow .body { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
  .drow .cond { font-size: 25px; font-weight: 600; color: var(--text-2); }
  .drow .cond b { color: var(--text); font-weight: 800; }
  .drow .arrow { display: flex; align-items: center; gap: 14px; margin-top: 12px; }
  .drow .arrow .fmt { font-size: 40px; font-weight: 900; letter-spacing: -.8px; color: var(--ac); }
  .drow .arrow svg { width: 34px; height: 34px; color: var(--text-3); }

  /* =====================================================================
     CARD 6 — 5 ОШИБОК
     ===================================================================== */
  .c6 .frame { background: #fff; }
  .errs { margin-top: 44px; display: flex; flex-direction: column; gap: 24px; }
  .err { display: flex; gap: 26px; align-items: flex-start; padding: 34px 32px; border-radius: 22px;
    background: #fff; border: 1px solid var(--card-line); box-shadow: 0 20px 44px -40px rgba(239,75,82,.55); position: relative; }
  .err::before { content:""; position: absolute; left: 0; top: 26px; bottom: 26px; width: 6px; border-radius: 0 4px 4px 0; background: var(--red); }
  .err .no { flex: 0 0 auto; width: 66px; height: 66px; border-radius: 18px; background: var(--red-t); color: var(--red);
    display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 900; }
  .err .tx .t { font-size: 27px; font-weight: 800; letter-spacing: -.3px; line-height: 1.18; }
  .err .tx .s { margin-top: 6px; font-size: 21px; line-height: 1.34; color: var(--text-2); font-weight: 500; }

  /* small kaiten card mock reused on card 6 header */
  .badmock { display: flex; gap: 14px; align-items: center; }
</style>
</head>
<body>
<main>
  <header class="head">
    <h1>Контент-план в Кайтен — карусель 1080×1350 (4:5)</h1>
    <p>6 карточек для ленты и историй: VK · Telegram · Дзен. Крупный текст, продуктовые мокапы Кайтен на каждой.</p>
  </header>

  <!-- ============================ CARD 1 — COVER ============================ -->
  <figure class="c1">
    <div class="frame">
      <div class="inner">
        <div class="kick">
          <span class="k-logo">
            <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" fill="#fff"/><rect x="14" y="3" width="7" height="7" rx="2" fill="#fff" opacity=".6"/><rect x="3" y="14" width="7" height="7" rx="2" fill="#fff" opacity=".6"/><rect x="14" y="14" width="7" height="7" rx="2" fill="#fff"/></svg>
          </span>
          КОНТЕНТ-ПЛАН · КАЙТЕН
        </div>
        <h1 class="big">3 способа<br>вести <em>контент-план</em></h1>
        <div class="sub">Таблица, календарь или канбан. Показываем, как выглядит каждый и когда его выбрать.</div>

        <div class="stack">
          <!-- table thumb -->
          <div class="thumb t-a">
            <div class="th-bar">
              <div class="th-ic" style="background:#2f8ff0"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg></div>
              <div class="th-tt">Таблица</div>
              <div class="th-tag" style="background:#2f8ff0">СПОСОБ 01</div>
            </div>
            <div class="th-body">
              <div class="th-col"><div class="th-row" style="width:70%"></div><div class="th-row" style="width:90%"></div><div class="th-row" style="width:55%"></div><div class="chipbar" style="width:40%;background:#cfe6fb"></div></div>
              <div class="th-col"><div class="th-row" style="width:80%"></div><div class="th-row" style="width:60%"></div><div class="th-row" style="width:85%"></div><div class="chipbar" style="width:50%;background:#d4f0dd"></div></div>
            </div>
          </div>
          <!-- calendar thumb -->
          <div class="thumb t-b">
            <div class="th-bar">
              <div class="th-ic" style="background:#f5960b"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></div>
              <div class="th-tt">Календарь</div>
              <div class="th-tag" style="background:#f5960b">СПОСОБ 02</div>
            </div>
            <div class="th-body" style="gap:8px">
              <div class="th-col" style="height:118px;flex-direction:row;flex-wrap:wrap;align-content:flex-start;gap:8px">
                <div class="chipbar" style="width:28%;height:26px;background:#cfe6fb"></div>
                <div class="chipbar" style="width:28%;height:26px;background:#eee"></div>
                <div class="chipbar" style="width:28%;height:26px;background:#ffe1b8"></div>
                <div class="chipbar" style="width:28%;height:26px;background:#eee"></div>
                <div class="chipbar" style="width:28%;height:26px;background:#d4c6f0"></div>
                <div class="chipbar" style="width:28%;height:26px;background:#d4f0dd"></div>
              </div>
            </div>
          </div>
          <!-- kanban thumb -->
          <div class="thumb t-c">
            <div class="th-bar">
              <div class="th-ic" style="background:#7d4ccf"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="4" width="5" height="16" rx="1.5"/><rect x="10" y="4" width="5" height="11" rx="1.5"/><rect x="17" y="4" width="4" height="14" rx="1.5"/></svg></div>
              <div class="th-tt">Канбан-доска</div>
              <div class="th-tag" style="background:#7d4ccf">СПОСОБ 03</div>
            </div>
            <div class="th-body" style="gap:10px">
              <div class="th-col" style="height:118px;background:#f3f1f9"><div class="chipbar" style="width:100%;height:30px;background:#fff;border:1px solid #e8e3f4"></div><div class="chipbar" style="width:100%;height:30px;background:#fff;border:1px solid #e8e3f4"></div></div>
              <div class="th-col" style="height:118px;background:#f3f1f9"><div class="chipbar" style="width:100%;height:30px;background:#fff;border:1px solid #e8e3f4"></div></div>
              <div class="th-col" style="height:118px;background:#f3f1f9"><div class="chipbar" style="width:100%;height:30px;background:#fff;border:1px solid #e8e3f4"></div><div class="chipbar" style="width:100%;height:30px;background:#fff;border:1px solid #e8e3f4"></div></div>
            </div>
          </div>
