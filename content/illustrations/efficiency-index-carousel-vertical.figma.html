<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Индекс деловой эффективности — 6 фреймов 1080×1350 для Figma</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --violet: #7d4ccf;
    --violet-deep: #6f43b8;
    --violet-tint: #efe9f9;
    --violet-line: #d8c8ef;
    --green: #3aa050;
    --green-tint: #e9f5ea;
    --green-line: #c9e6cd;
    --blue: #2186d9;
    --blue-tint: #e4f2fd;
    --blue-line: #c3e0f8;
    --orange: #e88f00;
    --orange-tint: #fff3e0;
    --orange-line: #f6ddb0;
    --red: #e2443a;
    --red-tint: #fde8e6;
    --text: #211a2e;
    --text-2: #6c6c78;
    --text-3: #9a9aa6;
    --card-line: #ececf0;
  }
  * { box-sizing: border-box; }
  html, body {
    background: #ffffff;
    color: var(--text);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 0; margin: 0;
  }
  main { width: 1080px; margin: 0; }
  figure { margin: 0 0 40px; }

  /* ---- exportable frame: fixed 1080 x 1350 (4:5) ---- */
  .frame {
    position: relative;
    width: 1080px; height: 1350px;
    overflow: hidden;
    background: #ffffff;
  }
  .glow { position: absolute; pointer-events: none; z-index: 0;
    background: radial-gradient(closest-side, rgba(125,76,207,0.13), rgba(125,76,207,0)); }
  .glow.tr { top: -280px; right: -240px; width: 760px; height: 760px; }
  .glow.bl { bottom: -320px; left: -260px; width: 840px; height: 840px; }
  .glow.green { background: radial-gradient(closest-side, rgba(58,160,80,0.12), rgba(58,160,80,0)); }
  .glow.blue { background: radial-gradient(closest-side, rgba(33,134,217,0.12), rgba(33,134,217,0)); }
  .glow.orange { background: radial-gradient(closest-side, rgba(232,143,0,0.12), rgba(232,143,0,0)); }
  .inner { position: relative; z-index: 1; height: 100%; padding: 74px 68px; display: flex; flex-direction: column; }

  .eyebrow { display: inline-flex; align-items: center; gap: 14px;
    font-weight: 800; font-size: 19px; letter-spacing: 2.6px; color: var(--text-2); }
  .eyebrow .n { display: inline-flex; align-items: center; justify-content: center;
    height: 44px; padding: 0 18px; border-radius: 12px; color: #fff; font-size: 18px; letter-spacing: 1.4px; }
  h2.title { margin: 26px 0 0; font-size: 76px; line-height: 1.02; font-weight: 900; letter-spacing: -2.4px; }
  .lead { margin: 22px 0 0; font-size: 29px; line-height: 1.36; color: var(--text-2); font-weight: 500; max-width: 900px; }
  .lead b { color: var(--text); font-weight: 700; }

  .notebox { margin-top: 40px; font-size: 26px; line-height: 1.4; color: var(--text-2); font-weight: 500;
    padding: 26px 30px 26px 32px; border-radius: 0 20px 20px 0; }
  .notebox b { color: var(--text); font-weight: 800; }

  /* ---- footer ---- */
  .foot { margin-top: auto; padding-top: 28px; display: flex; align-items: center; justify-content: space-between; }
  .foot .logo { height: 40px; width: auto; display: block; }
  .foot .site { font-size: 20px; font-weight: 700; color: var(--text-3); letter-spacing: -0.2px; }
  .foot .src { font-size: 18px; font-weight: 600; color: var(--text-3); }
  .foot.on-dark .site, .foot.on-dark .src { color: rgba(255,255,255,.6); }

  /* =====================================================================
     CARD 1 — COVER (dark)
     ===================================================================== */
  .c1 .frame { background: radial-gradient(120% 90% at 18% 2%, #3a2263 0%, #241640 55%, #1a1030 100%); }
  .c1 .kick { display: inline-flex; align-items: center; gap: 16px; color: #cbb6f2; font-weight: 800;
    font-size: 19px; letter-spacing: 2.8px; }
  .c1 .kick .k-logo { width: 44px; height: 44px; border-radius: 11px; display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(150deg,#8a5cd8,#6f43b8); flex: 0 0 auto; }
  .c1 .kick .k-logo svg { width: 26px; height: 26px; }
  .c1 h1.big { margin: 54px 0 0; color: #fff; font-size: 96px; font-weight: 900; line-height: 1.0; letter-spacing: -3.2px; }
  .c1 h1.big em { font-style: normal;
    background: linear-gradient(180deg,#c9a6f7,#9a6bec); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .c1 .sub { margin: 36px 0 0; color: #d6cbea; font-size: 30px; font-weight: 500; line-height: 1.38; max-width: 880px; }
  .c1 .sub b { color: #fff; font-weight: 700; }
  .c1 .row { display: flex; gap: 22px; margin-top: 72px; }
  .c1 .stat { flex: 1; background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.12);
    border-radius: 24px; padding: 36px 32px; }
  .c1 .stat .v { font-size: 60px; font-weight: 900; letter-spacing: -2px; line-height: 1; white-space: nowrap;
    background: linear-gradient(180deg,#e7d6ff,#b78bf0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .c1 .stat .l { margin-top: 14px; font-size: 22px; font-weight: 600; color: #cdbfe6; line-height: 1.3; }
  .c1 .dims { margin-top: 56px; display: flex; flex-wrap: wrap; gap: 14px; }
  .c1 .dim { display: inline-flex; align-items: center; gap: 12px; font-size: 23px; font-weight: 700; color: #e4daf5;
    border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.04); border-radius: 999px; padding: 14px 26px; }
  .c1 .dim i { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

  /* =====================================================================
     CARD 2 — ПРОПУСКНАЯ СПОСОБНОСТЬ (before / after)
     ===================================================================== */
  .c2 .eyebrow .n { background: var(--violet); }
  .c2 .eyebrow { color: var(--violet-deep); }
  .c2 .compare { margin-top: 64px; flex: 1; display: flex; align-items: center; gap: 26px; }
  .c2 .cmp { flex: 1; border-radius: 28px; padding: 52px 44px; position: relative; }
  .c2 .cmp .m { font-size: 21px; font-weight: 800; letter-spacing: 2.4px; }
  .c2 .cmp .v { margin-top: 22px; font-size: 138px; font-weight: 900; letter-spacing: -6px; line-height: 1; }
  .c2 .cmp .c { margin-top: 18px; font-size: 24px; font-weight: 600; line-height: 1.32; }
  .c2 .cmp.jan { background: #f6f5f9; border: 1px solid #e9e7ef; }
  .c2 .cmp.jan .m { color: var(--text-3); }
  .c2 .cmp.jan .v { color: #b3aec2; }
  .c2 .cmp.jan .c { color: var(--text-2); }
  .c2 .cmp.jun { background: linear-gradient(160deg,#8a5cd8,#6f43b8); color: #fff; box-shadow: 0 34px 70px -46px rgba(125,76,207,.85); }
  .c2 .cmp.jun .m { color: #dcc9fb; }
  .c2 .cmp.jun .c { color: #e9defc; }
  .c2 .cmp.jun .badge { position: absolute; top: -26px; right: 34px; background: #fff; color: var(--violet-deep);
    font-size: 30px; font-weight: 900; letter-spacing: -0.6px; border-radius: 999px; padding: 12px 26px;
    box-shadow: 0 18px 40px -22px rgba(33,22,58,.55); }
  .c2 .arrow { flex: 0 0 auto; color: var(--violet); }
  .c2 .arrow svg { width: 56px; height: 56px; display: block; }
  .c2 .notebox { background: var(--violet-tint); border-left: 7px solid var(--violet); }

  /* =====================================================================
     CARD 3 — БАЛАНС ПОТОКА (month bars)
     ===================================================================== */
  .c3 .eyebrow .n { background: var(--green); }
  .c3 .eyebrow { color: var(--green); }
  .c3 .bars { margin-top: 58px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .c3 .bar { display: grid; grid-template-columns: 128px 1fr 128px; align-items: center; gap: 22px; }
  .c3 .bar .bl { font-size: 25px; font-weight: 700; color: var(--text-2); }
  .c3 .bar .track { height: 52px; border-radius: 14px; background: #f2f4f2; overflow: hidden; }
  .c3 .bar .fill { display: block; height: 100%; border-radius: 14px; background: #a5d4ae; }
  .c3 .bar .bv { font-size: 28px; font-weight: 800; letter-spacing: -0.6px; color: var(--text-2); text-align: right;
    font-variant-numeric: tabular-nums; }
  .c3 .bar.hot .bl { color: var(--green); font-weight: 800; }
  .c3 .bar.hot .fill { background: linear-gradient(90deg,#4caf51,#3aa050); }
  .c3 .bar.hot .bv { color: var(--green); font-weight: 900; font-size: 32px; }
  .c3 .callout { margin-top: 44px; display: inline-flex; align-items: center; gap: 20px; align-self: flex-start;
    background: var(--green-tint); border: 1px solid var(--green-line); border-radius: 20px; padding: 22px 30px; }
  .c3 .callout .cn { font-size: 44px; font-weight: 900; color: var(--green); letter-spacing: -1px; white-space: nowrap; }
  .c3 .callout .ct { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1.3; }

  /* =====================================================================
     CARD 4 — СКОРОСТЬ (big number + function bars)
     ===================================================================== */
  .c4 .eyebrow .n { background: var(--blue); }
  .c4 .eyebrow { color: var(--blue); }
  .c4 .huge { margin-top: 46px; display: flex; align-items: baseline; gap: 26px; }
  .c4 .huge .num { font-size: 168px; font-weight: 900; line-height: 0.95; letter-spacing: -7px; color: var(--blue); }
  .c4 .huge .num small { font-size: 64px; letter-spacing: -2px; font-weight: 800; }
  .c4 .huge .cap { font-size: 28px; font-weight: 600; color: var(--text-2); line-height: 1.3; max-width: 400px; }
  .c4 .huge .cap b { color: var(--text); }
  .c4 .fbars { margin-top: 54px; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 19px; }
  .c4 .fbar { display: grid; grid-template-columns: 320px 1fr 96px; align-items: center; gap: 22px; }
  .c4 .fbar .bl { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .c4 .fbar .track { height: 44px; border-radius: 12px; background: #f1f5f9; overflow: hidden; }
  .c4 .fbar .fill { display: block; height: 100%; border-radius: 12px; background: linear-gradient(90deg,#54a9e8,#2186d9); }
  .c4 .fbar .bv { font-size: 26px; font-weight: 900; color: var(--blue); text-align: right; font-variant-numeric: tabular-nums; }
  .c4 .fbar.slow .fill { background: #bcd7ec; }
  .c4 .fbar.slow .bv { color: #7ba6c6; }
  .c4 .fnote { font-size: 21px; font-weight: 600; color: var(--text-3); margin-top: 6px; }
  .c4 .notebox { background: var(--blue-tint); border-left: 7px solid var(--blue); margin-top: 34px; }

  /* =====================================================================
     CARD 5 — ДИСЦИПЛИНА СРОКОВ (split duo)
     ===================================================================== */
  .c5 .eyebrow .n { background: var(--orange); }
  .c5 .eyebrow { color: var(--orange); }
  .c5 .huge { margin-top: 50px; }
  .c5 .huge .num { font-size: 190px; font-weight: 900; line-height: 0.92; letter-spacing: -8px; color: var(--orange); }
  .c5 .huge .num small { font-size: 84px; letter-spacing: -3px; }
  .c5 .huge .cap { margin-top: 28px; font-size: 31px; font-weight: 700; line-height: 1.28; max-width: 860px; letter-spacing: -0.5px; }
  .c5 .huge .cap b { color: var(--orange); }
  .c5 .duo { margin-top: 58px; flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-content: center; }
  .c5 .cell { border-radius: 26px; padding: 40px 38px; }
  .c5 .cell .t { font-size: 21px; font-weight: 800; letter-spacing: 1.8px; }
  .c5 .cell .vals { margin-top: 24px; display: flex; align-items: baseline; gap: 16px; }
  .c5 .cell .from { font-size: 44px; font-weight: 800; color: var(--text-3); letter-spacing: -1px; }
  .c5 .cell .to { font-size: 66px; font-weight: 900; letter-spacing: -2px; }
  .c5 .cell .arr { font-size: 40px; font-weight: 700; color: var(--text-3); }
  .c5 .cell .d { margin-top: 16px; font-size: 23px; font-weight: 600; color: var(--text-2); line-height: 1.32; }
  .c5 .cell.up { background: var(--green-tint); border: 1px solid var(--green-line); }
  .c5 .cell.up .t { color: var(--green); }
  .c5 .cell.up .to { color: var(--green); }
  .c5 .cell.down { background: var(--red-tint); border: 1px solid #f6c8c3; }
  .c5 .cell.down .t { color: var(--red); }
  .c5 .cell.down .to { color: var(--red); }
  .c5 .notebox { background: var(--orange-tint); border-left: 7px solid var(--orange); margin-top: 0; }

  /* =====================================================================
     CARD 6 — ИНДЕКС (dark closing, line chart)
     ===================================================================== */
  .c6 .frame { background: radial-gradient(120% 100% at 80% 100%, #35205c 0%, #241640 52%, #180e2c 100%); }
  .c6 .kick { display: inline-flex; align-items: center; gap: 12px; color: #cbb6f2; font-weight: 800;
    font-size: 19px; letter-spacing: 2.8px; }
  .c6 .huge { margin-top: 34px; display: flex; align-items: baseline; gap: 26px; flex-wrap: wrap; }
  .c6 .huge .num { font-size: 176px; font-weight: 900; line-height: 0.95; letter-spacing: -7px;
    background: linear-gradient(180deg,#e7d6ff,#a978f0); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .c6 .huge .cap { font-size: 26px; font-weight: 600; color: #cdbfe6; line-height: 1.35; max-width: 330px; }
  .c6 .chart { margin-top: 40px; }
  .c6 .chart svg { display: block; width: 100%; height: auto; }
  .c6 .p { margin: 40px 0 0; color: #d6cbea; font-size: 29px; font-weight: 500; line-height: 1.4; max-width: 920px; }
  .c6 .p b { color: #fff; font-weight: 700; }
  .c6 .metrics { display: flex; gap: 22px; margin-top: 52px; }
  .c6 .metrics .m { flex: 1; border: 1px solid rgba(255,255,255,.13); background: rgba(255,255,255,.045);
    border-radius: 20px; padding: 26px 24px; }
  .c6 .metrics .m .mv { font-size: 46px; font-weight: 900; letter-spacing: -1.4px; line-height: 1; }
  .c6 .metrics .m .mv.plus { color: #7de29a; }
  .c6 .metrics .m .mv.minus { color: #ffb37d; }
  .c6 .metrics .m .ml { margin-top: 12px; font-size: 20px; font-weight: 600; color: #cdbfe6; line-height: 1.28; }
</style>
</head>
<body>
<main>

  <!-- ============================ CARD 1 — COVER ============================ -->
  <figure class="c1">
    <div class="frame">
      <div class="inner">
        <div class="kick">
          <span class="k-logo">
            <svg viewBox="0 0 24 24" fill="none"><path d="M4 19V11" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/><path d="M9.5 19V5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".65"/><path d="M15 19v-8" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/><path d="M20.5 19V8" stroke="#fff" stroke-width="2.6" stroke-linecap="round" opacity=".65"/></svg>
          </span>
          ИССЛЕДОВАНИЕ KAITEN · ЯНВАРЬ–ИЮНЬ 2026
        </div>
        <h1 class="big">Как российский бизнес работает <em>на самом деле</em></h1>
        <div class="sub">Индекс деловой эффективности сводит в одно число то, как компании ставят, ведут и закрывают задачи.</div>

        <div class="row">
          <div class="stat"><div class="v">3 210</div><div class="l">компаний в выборке</div></div>
          <div class="stat"><div class="v">5,3 млн</div><div class="l">реальных задач за полугодие</div></div>
          <div class="stat"><div class="v">205 878</div><div class="l">активных досок</div></div>
        </div>

        <div class="dims">
          <span class="dim"><i style="background:#b78bf0"></i>Пропускная способность</span>
          <span class="dim"><i style="background:#7de29a"></i>Баланс потока</span>
          <span class="dim"><i style="background:#7cc4f8"></i>Скорость исполнения</span>
          <span class="dim"><i style="background:#ffb37d"></i>Дисциплина сроков</span>
        </div>
